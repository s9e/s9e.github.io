<!DOCTYPE html>
<title>Content from Mastodon</title>
<body style="margin:0">
<script>
(function (body)
{
	let height, port;
	onmessage = function (e)
	{
		if (e.data === 's9e:init')
		{
			port = e.ports[0];
			e.stopImmediatePropagation();
		}
		else
		{
			let iframe = body.firstChild;
			if (e.source === iframe.contentWindow)
			{
				height = e.data.height;
				iframe.style.height = height + 'px';
			}
		}

		if (height && port)
		{
			port.postMessage(height);
		}
	};

	body.innerHTML='<iframe onload="contentWindow.postMessage({id:0,type:\'setHeight\'},\'*\')" scrolling="no" src="https://mastodon.social/@' + location.hash.replace(/[^\w/]/g, '') + '/embed" style="border:0;width:100%"></iframe>';
})(document.body);
</script>
