<!DOCTYPE html>
<title>Content from Mastodon</title>
<body style="margin:0">
<script>
(function (body)
{
	let height, port;
	onmessage = function (e)
	{
		e.stopImmediatePropagation();
		if (e.data === 's9e:init')
		{
			port = e.ports[0];
		}
		else
		{
			if (e.source === body.firstChild.contentWindow)
			{
				height = +e.data.height;
			}
		}

		if (height && port)
		{
			port.postMessage(height);
		}
	};

	body.innerHTML='<iframe onload="contentWindow.postMessage({id:0,type:\'setHeight\'},\'*\')" scrolling="no" src="https://mastodon.social/@' + location.hash.replace(/[^\w/]/g, '') + '/embed" style="border:0;height:100vh;width:100%"></iframe>';
})(document.body);
</script>
